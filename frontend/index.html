<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Stock Price Predictor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">📈 StockLSTM</div>
            <div class="splash-loading-bar"></div>
        </div>
    </div>
    
    <nav class="navbar">
        <div class="nav-logo">📈 StockLSTM</div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Stock Price Predictor</h1>
            <p class="subtitle">Enter any stock ticker to forecast the next 7 days</p>
        </div>

        <div class="input-card">
            <div class="input-row">
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="tickerInput"
                        placeholder="Enter ticker or company name (e.g. Apple, TSLA)"
                        maxlength="50"
                        autocomplete="off"
                    />
                    <div id="searchDropdown" class="search-dropdown hidden"></div>
                </div>
                <button id="predictBtn">Predict</button>
            </div>
        </div>

        <div id="errorMsg" class="error hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Fetching data and running LSTM model...</p>
        </div>

        <div id="statsBar" class="stats-bar hidden">
            <div class="stat">
                <span class="stat-label">Ticker</span>
                <span class="stat-value" id="statTicker">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">Last Close</span>
                <span class="stat-value" id="statLastClose">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">Day 1 Forecast</span>
                <span class="stat-value" id="statForecast">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">Change</span>
                <span class="stat-value" id="statChange">—</span>
            </div>
            <div class="stat">
                <span class="stat-label">Trend</span>
                <span class="stat-value" id="statTrend">—</span>
            </div>
        </div>
        <div id="chartContainer" class="hidden">
            <h2 id="chartTitle"></h2>
            <div class="timeframe-filters">
                <button class="time-btn" data-days="5">1W</button>
                <button class="time-btn active" data-days="21">1M</button>
                <button class="time-btn" data-days="63">3M</button>
                <button class="time-btn" data-days="126">6M</button>
                <button class="time-btn" data-days="252">1Y</button>
            </div>
            <canvas id="stockChart"></canvas>
        </div>
    </div>

    <footer class="footer">
        <p>Built for educational purposes only.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
